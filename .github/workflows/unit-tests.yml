name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests (googlePlay + fDroid + fDroidLite flavors)
        # fDroid flavor covers the android.location-based LocationHelper;
        # googlePlay covers the FusedLocationProviderClient path; fDroidLite
        # validates the INCLUDE_WEBHOOK=false build. All need to pass before
        # a merge.
        run: ./gradlew testGooglePlayDebugUnitTest testFDroidDebugUnitTest testFDroidLiteDebugUnitTest --no-daemon

      - name: Run lint
        run: ./gradlew lintGooglePlayDebug --no-daemon

      - name: Generate unit-test coverage report
        run: ./gradlew createGooglePlayDebugUnitTestCoverageReport --no-daemon

      - name: Upload test, lint, and coverage reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-report
          path: |
            app/build/reports/
            app/build/test-results/
