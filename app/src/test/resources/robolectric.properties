# Default Robolectric SDK for tests that don't specify @Config(sdk = [...]).
# Matches the production compileSdk/targetSdk so the default coverage
# exercises real production behavior. Tests that specifically exercise
# version-sensitive branches override with @Config to span the matrix
# (typically [23, 28, 33, 34, 35, 36]).
#
# Requires JDK 21 — Robolectric 4.16's SDK 36 image won't load on JDK 17.
sdk=36
